name: SonarQube Scan

on:
  push:
    branches:
      - main
      - develop
      - feature/*

  pull_request:
    branches:
      - main
      - develop

  # =================================================================
  # TAMBAHAN: Mengaktifkan tombol "Run workflow" manual di web GitHub
  # =================================================================
  workflow_dispatch:

jobs:
  sonarqube-scan:
    runs-on: self-hosted

    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =================================================================
      # LOGIKA OPSI 1: OTOMATIS BERDASARKAN NAMA BRANCH DEVELOPER
      # =================================================================
      - name: Set Project Key
        run: |
          # 1. Ambil nama branch dari GitHub Actions yang memicu workflow ini
          # 2. Mengubah karakter '/' menjadi '-' agar aman untuk URL/Key (misal: feature/test -> feature-test)
          # 3. Mengubah semua huruf menjadi huruf kecil (lowercase)
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          
          # 4. Gabungkan nama repositori utama (pullcode) dengan nama branch developer
          SONAR_KEY="repo_pullcode_${BRANCH_NAME}"
          
          echo "SONAR_KEY=$SONAR_KEY" >> $GITHUB_ENV
      # =================================================================

      - name: Sonar Scan
        run: |
          /opt/sonar-scanner/bin/sonar-scanner \
            -Dsonar.projectKey=$SONAR_KEY \
            -Dsonar.projectName=$SONAR_KEY \
            -Dsonar.sources=. \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN